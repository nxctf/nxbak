name: NXBAK Monthly Snapshot

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install NXBAK
        run: pip install .

      - name: Run doctor
        env:
          NXBAK_SUPABASE_DB_URL: ${{ secrets.NXBAK_SUPABASE_DB_URL }}
          NXBAK_ENCRYPTION_KEY: ${{ secrets.NXBAK_ENCRYPTION_KEY }}
        run: nxbak doctor

      - name: Create monthly snapshot
        env:
          NXBAK_SUPABASE_DB_URL: ${{ secrets.NXBAK_SUPABASE_DB_URL }}
          NXBAK_ENCRYPTION_KEY: ${{ secrets.NXBAK_ENCRYPTION_KEY }}
        run: nxbak backup --monthly
